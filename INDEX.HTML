<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #000000);
      color: #e0f2fe;
    }

    .container {
      width: 60%;
      margin: 50px auto;
    }

    .card {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.6);
      border: 1px solid #38bdf8;
    }

    .profile {
      display: flex;
      align-items: center;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      margin-right: 20px;
      color: black;
    }

    .name {
      font-size: 26px;
      font-weight: bold;
      color: #38bdf8;
    }

    .enroll {
      color: #94a3b8;
      margin-top: 5px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 15px;
      border-radius: 20px;
      background: #0ea5e9;
      font-size: 12px;
      color: black;
    }

    .assignment {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .left {
      display: flex;
      align-items: center;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 15px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-weight: bold;
      color: black;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #38bdf8;
    }

    .subtitle {
      color: #cbd5f5;
      font-size: 14px;
    }

    .btn {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      color: black;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.85;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- Profile Card -->
  <div class="card">
    <div class="profile">
      <div class="avatar">VR</div>
      <div>
        <div class="name">Vaghasiya Ridham</div>
        <div class="enroll">Enrollment: 20230905090058</div>
        <div class="badge">CRYPTOGRAPHY AND NETWORK SECURITY</div>
      </div>
    </div>
  </div>

  <!-- Assignment 1 -->
  <div class="card assignment">
    <div class="left">
      <div class="icon">A1</div>
      <div>
        <div class="title">Assignment 1</div>
        <div class="subtitle">CNS — ALA 1 PDF Report</div>
      </div>
    </div>
    <button class="btn">View PDF</button>
  </div>

  <!-- Assignment 2 -->
  <div class="card assignment">
    <div class="left">
      <div class="icon">A2</div>
      <div>
        <div class="title">Assignment 2</div>
        <div class="subtitle">CNS — ALA 2 PDF Report</div>
      </div>
    </div>
    <button class="btn">View PDF</button>
  </div>

  <!-- Assignment 3 -->
  <div class="card assignment">
    <div class="left">
      <div class="icon">A3</div>
      <div>
        <div class="title">Assignment 3</div>
        <div class="subtitle">CNS — ALA 3 PDF Report</div>
      </div>
    </div>
    <button class="btn">View PDF</button>
  </div>

</div>

</body>
</html>
